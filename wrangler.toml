# =============================================================================
# Top-level = PRODUCTION worker (deployed from `main` branch).
# Worker name:  email-unsubscriber-oauth
# Route:        auth.email-unsubscriber.com/api/*
# Deploy cmd:   `npx wrangler deploy`   (no --env flag)
#
# Staging and dev are defined as named environments below — deploy them with
# `--env staging` / `--env dev`. See each environment block for CF build cmd.
#
# Secrets (set per-worker via Cloudflare dashboard or `wrangler secret put`):
#   - GOOGLE_OAUTH_CLIENT_ID
#   - GOOGLE_OAUTH_CLIENT_SECRET
#   - MICROSOFT_OAUTH_CLIENT_ID
#   - MICROSOFT_OAUTH_CLIENT_SECRET
# =============================================================================

name = "email-unsubscriber-oauth-staging"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[vars]
ENVIRONMENT = "production"
USER_INFO_SERVICE_URL = "https://api.email-unsubscriber.com/api"
ALLOWED_REDIRECT_URIS = "https://app.email-unsubscriber.com/,https://staging.email-unsubscriber-webapp.pages.dev/,https://develop.email-unsubscriber-webapp.pages.dev/"

# =============================================================================
# STAGING worker (deployed from `staging` branch).
# Worker name:  email-unsubscriber-oauth-staging
# Route:        auth.email-unsubscriber.com/api-staging/*
# Deploy cmd:   `npx wrangler deploy --env staging`
# =============================================================================
[env.staging]
name = "email-unsubscriber-oauth-staging"

[env.staging.observability]
enabled = true

[env.staging.observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[env.staging.vars]
ENVIRONMENT = "staging"
USER_INFO_SERVICE_URL = "https://api.email-unsubscriber.com/api-staging"
ALLOWED_REDIRECT_URIS = "https://app.email-unsubscriber.com/,http://localhost:5173/,http://localhost:3000/,http://127.0.0.1:5173/,https://staging.email-unsubscriber-webapp.pages.dev/,https://develop.email-unsubscriber-webapp.pages.dev/"

# =============================================================================
# LOCAL DEVELOPMENT (run with `wrangler dev --env dev` or `npm run dev`).
# Worker name:  email-unsubscriber-oauth-dev
# Routes:       workers.dev subdomain / localhost
# Deploy cmd:   `npx wrangler deploy --env dev`   (rarely used; local only)
# =============================================================================
[env.dev]
name = "email-unsubscriber-oauth-dev"

[env.dev.vars]
ENVIRONMENT = "development"
USER_INFO_SERVICE_URL = "http://127.0.0.1:3020"
ALLOWED_REDIRECT_URIS = "http://localhost:5173/,http://localhost:3000/,http://127.0.0.1:5173/"